<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ZoneClock — World Time Zones</title>
  
  <!-- PWA & Mobile Web Capabilities -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0a0a0f">
  
  <!-- iOS Safari Specific Fixes -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ZoneClock">
  
  <!-- App Icons -->
  <link rel="apple-touch-icon" href="./icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="./icon-180.png">
  <link rel="apple-touch-icon" sizes="167x167" href="./icon-180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./icon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #0a0a0f;
      --surface-color: #12121e;
      --surface-hover: #1a1a2e;
      --border-color: #22223b;
      --text-color: #f8f9fa;
      --text-secondary: #8d99ae;
      --accent-color: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.15);
      --danger-color: #ef4444;
      --success-color: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 80px;
    }

    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: calc(80px + env(safe-area-inset-bottom));
      }
    }

    header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(10, 10, 15, 0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      background-color: var(--accent-color);
      border-radius: 50%;
    }

    main {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* World Clock Layout */
    .hero-clock {
      text-align: center;
      padding: 2.5rem 1rem;
      margin-bottom: 2rem;
    }

    .hero-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 4.5rem;
      font-weight: 300;
    }

    .hero-date {
      color: var(--text-secondary);
      text-transform: uppercase;
      font-size: 0.875rem;
      letter-spacing: 0.05em;
    }

    .clock-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    .clock-card {
      background-color: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.5rem;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .card-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.25rem;
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 1rem;
    }

    /* Input & Utility Layout Blocks */
    .feature-card {
      background-color: var(--surface-color);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 2rem;
      max-width: 600px;
      margin: 0 auto 1.5rem auto;
    }

    .feature-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .app-input, .app-select {
      width: 100%;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      color: white;
      padding: 0.85rem 1rem;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
    }

    .app-input:focus, .app-select:focus {
      border-color: var(--accent-color);
    }

    .app-btn {
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 0.85rem 1.5rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }

    /* List displays */
    .item-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .list-item {
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      padding: 1rem;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Navigation Menu Row */
    .nav-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background-color: rgba(18, 18, 30, 0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: space-around;
      padding: 0.75rem 0;
      z-index: 1000;
    }

    .nav-item {
      background: none;
      border: none;
      color: var(--text-secondary);
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 0.7rem;
      cursor: pointer;
      width: 20%;
      gap: 2px;
    }

    .nav-item.active { color: var(--accent-color); }
    .nav-icon { font-size: 1.2rem; }

    /* Quick Floating Action Button */
    .fab {
      position: fixed;
      bottom: 95px; right: 20px;
      background-color: var(--accent-color);
      color: white;
      border: none;
      width: 56px; height: 56px;
      border-radius: 50%;
      font-size: 1.5rem;
      cursor: pointer;
      z-index: 99;
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    /* Modal Picker Sheet */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0,0,0,0.6);
      display: none;
      align-items: flex-end;
      z-index: 2000;
    }
    .modal-overlay.open { display: flex; }
    
    .modal-sheet {
      background-color: var(--surface-color);
      width: 100%;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      padding: 2rem 1.5rem;
      max-height: 70vh;
      overflow-y: auto;
    }

    .city-option {
      padding: 1rem;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      margin-bottom: 0.5rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
    }

    /* Educational Smart Banner for iOS Safari installation */
    .ios-install-banner {
      display: none;
      position: fixed;
      bottom: 90px; left: 15px; right: 15px;
      background-color: #1c1c2e;
      border: 1px solid #3a3a5c;
      border-radius: 14px;
      padding: 1rem;
      z-index: 9999;
    }
    .ios-banner-content { display: flex; align-items: center; gap: 12px; font-size: 0.9rem; }
    .ios-banner-icon { width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0; }
    .ios-banner-close { position: absolute; top: 6px; right: 10px; background: none; border: none; color: #8d99ae; }
  </style>
</head>
<body>

  <header>
    <div class="logo"><div class="logo-dot"></div>ZoneClock</div>
    <nav class="nav-bar">
      <button class="nav-item active" onclick="switchTab('clocks')"><span class="nav-icon">⏰</span><span>Clock</span></button>
      <button class="nav-item" onclick="switchTab('alarms')"><span class="nav-icon">🔔</span><span>Alarms</span></button>
      <button class="nav-item" onclick="switchTab('converter')"><span class="nav-icon">🔄</span><span>Converter</span></button>
      <button class="nav-item" onclick="switchTab('lookup')"><span class="nav-icon">🔍</span><span>Is It There</span></button>
      <button class="nav-item" onclick="switchTab('desk')"><span class="nav-icon">📺</span><span>Desk</span></button>
    </nav>
  </header>

  <main>
    <!-- TAB 1: WORLD CLOCKS -->
    <section id="clocks-tab" class="tab-content active">
      <div class="hero-clock">
        <div class="hero-time" id="local-time">00:00:00</div>
        <div class="hero-date" id="local-date">Loading...</div>
      </div>
      <div class="clock-grid" id="tracked-clocks"></div>
    </section>

    <!-- TAB 2: ALARMS -->
    <section id="alarms-tab" class="tab-content">
      <div class="feature-card">
        <div class="feature-title">Set System Alarm</div>
        <div class="form-group">
          <label>Alarm Time</label>
          <input type="time" class="app-input" id="alarm-time">
        </div>
        <button class="app-btn" onclick="addAlarm()">Add Alarm</button>
        <div class="item-list" id="alarm-list"></div>
      </div>
    </section>

    <!-- TAB 3: ZONE CONVERTER -->
    <section id="converter-tab" class="tab-content">
      <div class="feature-card">
        <div class="feature-title">Time Zone Converter</div>
        <div class="form-group">
          <label>Base Time</label>
          <input type="time" class="app-input" id="conv-source-time" oninput="runConversion()">
        </div>
        <div class="form-group">
          <label>Target Zone</label>
          <select class="app-select" id="conv-target-zone" onchange="runConversion()"></select>
        </div>
        <div style="margin-top: 1.5rem; padding: 1rem; background: var(--bg-color); border-radius:10px;">
          <span style="color:var(--text-secondary); font-size:0.85rem;">Converted Equivalent:</span>
          <div id="conv-result" style="font-family:'JetBrains Mono', monospace; font-size:1.75rem; margin-top:0.25rem;">--:--</div>
        </div>
      </div>
    </section>

    <!-- TAB 4: WHAT TIME IS IT THERE LOOKUP -->
    <section id="lookup-tab" class="tab-content">
      <div class="feature-card">
        <div class="feature-title">What time is it there?</div>
        <div class="form-group">
          <label>Select Target City Timeline</label>
          <select class="app-select" id="lookup-zone" onchange="runQuickLookup()"></select>
        </div>
        <div style="margin-top: 1.5rem; text-align: center; padding: 2rem 1rem; background: var(--bg-color); border-radius:12px;">
          <div id="lookup-time" style="font-family:'JetBrains Mono', monospace; font-size:3rem; font-weight:400;">00:00:00</div>
          <div id="lookup-date" style="color:var(--text-secondary); font-size:0.9rem; margin-top:0.5rem;">Choose a location</div>
        </div>
      </div>
    </section>

    <!-- TAB 5: DESK MODE -->
    <section id="desk-tab" class="tab-content">
      <div style="text-align:center; padding-top:6rem;">
        <div class="hero-time" id="desk-time" style="font-size:6.5rem;">00:00</div>
        <div class="hero-date" id="desk-date">...</div>
      </div>
    </section>
  </main>

  <button class="fab" id="open-picker-btn">＋</button>

  <!-- iOS Installer System Drawer Notification UI -->
  <div class="ios-install-banner" id="ios-banner">
    <button class="ios-banner-close" onclick="closeIosBanner()">✕</button>
    <div class="ios-banner-content">
      <img src="./icon-180.png" class="ios-banner-icon" alt="App Icon">
      <div>
        <strong>Install ZoneClock</strong><br>
        Tap the Safari **Share** button below, scroll down the sheet, and tap **Add to Home Screen** ＋.
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="picker-modal">
    <div class="modal-sheet">
      <input type="text" class="search-input" id="city-search" placeholder="Search world cities...">
      <div id="search-results"></div>
    </div>
  </div>

  <script>
    const AVAILABLE_CITIES = [
      { name: 'London', zone: 'Europe/London' },
      { name: 'New York', zone: 'America/New_York' },
      { name: 'Tokyo', zone: 'Asia/Tokyo' },
      { name: 'Paris', zone: 'Europe/Paris' },
      { name: 'Sydney', zone: 'Australia/Sydney' },
      { name: 'Dubai', zone: 'Asia/Dubai' },
      { name: 'Los Angeles', zone: 'America/Los_Angeles' },
      { name: 'Singapore', zone: 'Asia/Singapore' }
    ];

    let userTrackedZones = JSON.parse(localStorage.getItem('tracked_zones')) || ['America/New_York', 'Europe/London', 'Asia/Tokyo'];
    let userAlarms = JSON.parse(localStorage.getItem('user_alarms')) || [];

    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById(`${tabId}-tab`).classList.add('active');
      event.currentTarget.classList.add('active');
      
      if (tabId === 'clocks') {
        document.getElementById('open-picker-btn').style.display = 'block';
      } else {
        document.getElementById('open-picker-btn').style.display = 'none';
      }
    }

    // Modal Picker
    const modal = document.getElementById('picker-modal');
    document.getElementById('open-picker-btn').addEventListener('click', () => {
      modal.classList.add('open');
      renderPickerOptions('');
    });

    modal.addEventListener('click', (e) => {
      if(e.target === modal) modal.classList.remove('open');
    });

    document.getElementById('city-search').addEventListener('input', (e) => {
      renderPickerOptions(e.target.value);
    });

    function renderPickerOptions(filterText) {
      const target = document.getElementById('search-results');
      target.innerHTML = '';
      AVAILABLE_CITIES.filter(c => c.name.toLowerCase().includes(filterText.toLowerCase())).forEach(city => {
        const row = document.createElement('div');
        row.className = 'city-option';
        row.innerHTML = `<span>${city.name}</span><span style="color:var(--text-secondary)">${city.zone}</span>`;
        row.onclick = () => {
          if (!userTrackedZones.includes(city.zone)) {
            userTrackedZones.push(city.zone);
            localStorage.setItem('tracked_zones', JSON.stringify(userTrackedZones));
            renderTrackedClocks();
          }
          modal.classList.remove('open');
        };
        target.appendChild(row);
      });
    }

    function removeZone(zone) {
      userTrackedZones = userTrackedZones.filter(z => z !== zone);
      localStorage.setItem('tracked_zones', JSON.stringify(userTrackedZones));
      renderTrackedClocks();
    }

    // Alarm Systems Engine
    function renderAlarms() {
      const container = document.getElementById('alarm-list');
      container.innerHTML = '';
      userAlarms.forEach((alarm, index) => {
        const row = document.createElement('div');
        row.className = 'list-item';
        row.innerHTML = `<span style="font-family:'JetBrains Mono', monospace; font-size:1.25rem;">${alarm}</span>
                         <button class="remove-btn" onclick="deleteAlarm(${index})">✕</button>`;
        container.appendChild(row);
      });
    }

    function addAlarm() {
      const timeVal = document.getElementById('alarm-time').value;
      if(timeVal && !userAlarms.includes(timeVal)) {
        userAlarms.push(timeVal);
        localStorage.setItem('user_alarms', JSON.stringify(userAlarms));
        renderAlarms();
      }
    }

    function deleteAlarm(index) {
      userAlarms.splice(index, 1);
      localStorage.setItem('user_alarms', JSON.stringify(userAlarms));
      renderAlarms();
    }

    // Dropdown population loaders
    function populateDropdowns() {
      const convSelect = document.getElementById('conv-target-zone');
      const lookupSelect = document.getElementById('lookup-zone');
      
      AVAILABLE_CITIES.forEach(city => {
        const opt1 = new Option(city.name, city.zone);
        const opt2 = new Option(city.name, city.zone);
        convSelect.add(opt1);
        lookupSelect.add(opt2);
      });
    }

    // Time Zone Conversion Calculations
    function runConversion() {
      const baseTime = document.getElementById('conv-source-time').value;
      const targetZone = document.getElementById('conv-target-zone').value;
      if (!baseTime) return;

      const [hrs, mins] = baseTime.split(':');
      const dummyDate = new Date();
      dummyDate.setHours(hrs, mins, 0);

      const resultStr = dummyDate.toLocaleTimeString('en-US', {
        timeZone: targetZone,
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });
      document.getElementById('conv-result').innerText = resultStr;
    }

    // Quick Lookup Watcher
    function runQuickLookup() {
      const zone = document.getElementById('lookup-zone').value;
      const now = new Date();
      document.getElementById('lookup-time').innerText = now.toLocaleTimeString('en-US', { timeZone: zone, hour12: false });
      document.getElementById('lookup-date').innerText = now.toLocaleDateString('en-US', { timeZone: zone, weekday: 'long', month: 'short', day: 'numeric' });
    }

    // Global Time Ticker
    function tick() {
      const now = new Date();
      document.getElementById('local-time').innerText = now.toLocaleTimeString('en-US', { hour12: false });
      document.getElementById('local-date').innerText = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      document.getElementById('desk-time').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
      document.getElementById('desk-date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

      // Run card rendering checks
      userTrackedZones.forEach(zone => {
        const elTime = document.getElementById(`time-${zone.replace(/\//g, '-')}`);
        const elDate = document.getElementById(`date-${zone.replace(/\//g, '-')}`);
        if(elTime && elDate) {
          elTime.innerText = now.toLocaleTimeString('en-US', { timeZone: zone, hour12: false });
          elDate.innerText = now.toLocaleDateString('en-US', { timeZone: zone, month: 'short', day: 'numeric' });
        }
      });

      // Maintain background lookup loop
      if (document.getElementById('lookup-tab').classList.contains('active')) {
        runQuickLookup();
      }

      // Check Active Alarms
      const localTimeShort = now.toTimeString().slice(0, 5);
      if (userAlarms.includes(localTimeShort) && now.getSeconds() === 0) {
        alert(`⏰ Alarm! It is exactly ${localTimeShort}`);
      }
    }

    function renderTrackedClocks() {
      const container = document.getElementById('tracked-clocks');
      container.innerHTML = '';
      userTrackedZones.forEach(zone => {
        const safeId = zone.replace(/\//g, '-');
        const card = document.createElement('div');
        card.className = 'clock-card';
        card.innerHTML = `
          <div class="card-header">
            <strong>${zone.split('/')[1].replace('_', ' ')}</strong>
            <button class="remove-btn" onclick="removeZone('${zone}')">✕</button>
          </div>
          <div class="card-time" id="time-${safeId}">00:00:00</div>
          <div class="card-date" id="date-${safeId}">...</div>
        `;
        container.appendChild(card);
      });
      tick();
    }

    function checkIosPrompt() {
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
      if (isIOS && !isStandalone) {
        document.getElementById('ios-banner').style.display = 'block';
      }
    }

    function closeIosBanner() { document.getElementById('ios-banner').style.display = 'none'; }

    // Bootstrap app
    populateDropdowns();
    renderTrackedClocks();
    renderAlarms();
    setInterval(tick, 1000);
    window.addEventListener('load', checkIosPrompt);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(err => console.error(err));
    }
  </script>
</body>
</html>
